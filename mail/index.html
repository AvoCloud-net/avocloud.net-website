<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Support Mail – Avocloud.net</title>
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="../assets/images/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png">
    <meta name="theme-color" content="#0B0B0B">
    <meta name="description" content="Send us an email to solve support requests quickly and easily.">
    <meta name="author" content="Avocloud.net">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Avocloud.net Support">
    <meta property="og:description" content="Send us an email to solve support requests quickly and easily.">
    <meta property="og:image" content="/assets/images/logo.png">
    <meta property="og:url" content="https://avocloud.net/mail/">
    <meta property="og:type" content="website">
    <meta http-equiv="refresh" content="3;url=mailto:support@avocloud.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10-beta.2/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="../assets/js/theme.js"></script>
</head>

<body>
    <div id="gradientbar"></div>

    <!-- Nav -->
    <nav class="site-nav" id="site-nav">
        <a class="avocloud-logo" href="/" aria-label="AVOCLOUD.NET">
            <span class="avocloud-logo__slot">
                <span class="avocloud-logo__icon">
                    <svg viewBox="0 0 72 72" fill="none">
                        <path d="M22 18 L12 18 L12 54 L22 54 M50 18 L60 18 L60 54 L50 54 M26 30 L33 36 L26 42"
                            stroke="currentColor" stroke-width="6"
                            stroke-linecap="round" stroke-linejoin="round"
                            pathLength="200"/>
                        <rect class="logo-cursor" x="40" y="28" width="4" height="16" rx="2"/>
                    </svg>
                </span>
                <span class="avocloud-logo__av">AVO</span>
            </span>
            <span class="avocloud-logo__rest-wrap">
                <span class="avocloud-logo__rest">CLOUD<span class="avocloud-logo__dot">.NET</span></span>
            </span>
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <svg id="theme-icon" viewBox="0 0 24 24"></svg>
        </button>
    </nav>

    <div class="redirect-container">
        <div class="card text-center" style="max-width: 400px; width: 100%; padding: 2.5rem 2rem;">
            <div class="flex justify-center mb-4">
                <svg class="lucide" viewBox="0 0 24 24" style="width:2.5rem;height:2.5rem;color:var(--avo-primary, #FF6B4A);animation:spin 1.2s linear infinite;">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold mb-2">Opening <span class="highlight-purple">Mail</span></h1>
            <p class="text-muted text-sm mb-6">Your mail client will open automatically in a moment...</p>
            <a href="mailto:support@avocloud.net" class="accent-link text-sm">
                Click here if nothing happens ↗
            </a>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="../assets/js/main.js"></script>
</body>

</html>
