<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Not Found | Avocloud.net</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0b0f;
            --bg-card: #111118;
            --border: rgba(255, 255, 255, 0.06);
            --text-primary: #e8e8ed;
            --text-secondary: #8a8a9a;
            --text-muted: #55556a;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --yellow: #ffc312;
            --yellow-glow: rgba(255, 195, 18, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'DM Sans', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, var(--yellow-glow) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        .header {
            position: relative;
            z-index: 1;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .header-logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-logo .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--yellow);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .header-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--yellow);
            background: var(--yellow-glow);
            border: 1px solid rgba(255, 195, 18, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--yellow);
            background: var(--yellow-glow);
            border: 1px solid rgba(255, 195, 18, 0.15);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-bottom: 2rem;
        }
        .error-badge svg { width: 14px; height: 14px; }
        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            letter-spacing: -0.04em;
        }
        .error-code span { color: var(--yellow); }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        .description {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-align: left;
        }
        .info-box svg { width: 18px; height: 18px; color: var(--text-muted); flex-shrink: 0; }
        .info-box p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
        .info-box code {
            font-family: 'JetBrains Mono', monospace;
            color: var(--yellow);
            font-size: 0.8rem;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-primary:hover {
            background: #5b52e0;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary svg { width: 16px; height: 16px; }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            transform: translateY(-1px);
        }
        .btn-secondary svg { width: 16px; height: 16px; }
        .footer {
            position: relative;
            z-index: 1;
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .footer p { font-size: 0.8rem; color: var(--text-muted); }
        .footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
        .footer a:hover { color: var(--accent); }
        @media (max-width: 540px) {
            .card { padding: 2rem 1.5rem; }
            .error-code { font-size: 3.5rem; }
            .header { padding: 1rem 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="https://avocloud.net" class="header-logo">
            <span class="dot"></span>
            Avocloud.net
        </a>
        <span class="header-tag">Not Found</span>
    </div>
    <div class="main">
        <div class="card">
            <div class="error-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                HTTP 404
            </div>
            <div class="error-code">4<span>04</span></div>
            <h1>Page Not Found</h1>
            <p class="description">
                The page you're looking for doesn't exist or has been moved. It might have wandered off into the digital void.
            </p>
            <div class="info-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <p>The requested URL was not found on this server.</p>
            </div>
            <div class="btn-group">
                <a href="https://avocloud.net" class="btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Go Home
                </a>
                <button class="btn-secondary" onclick="history.back()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Go Back
                </button>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Managed by <a href="https://avocloud.net">Avocloud.net</a> &middot; <a href="https://avocloud.net/impressum.html">Imprint</a></p>
    </div>
</body>
</html>
