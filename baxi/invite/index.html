<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Discord – Avocloud.net</title>
    <link rel="shortcut icon" href="../assets/images/logo.png" type="image/x-icon">
    <meta name="description" content="Invite the Discord bot Baxi to your server.">
    <meta name="author" content="Avocloud.net">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Baxi Bot Invite">
    <meta property="og:description" content="Invite the Discord bot Baxi to your server.">
    <meta property="og:image" content="https://avocloud.net/baxi/baxi-banner.png">
    <meta property="og:url" content="https://avocloud.net/baxi/invite/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Baxi - Discord Bot">
    <meta name="twitter:description"
        content="Baxi is a verified Discord bot with intelligent chat filter, global spammer database, and much more.">
    <meta name="twitter:image" content="https://avocloud.net/baxi/baxi-banner.png">
    <meta http-equiv="refresh"
        content="3;url=https://discord.com/oauth2/authorize?client_id=981268814308184084&amp;permissions=564464222465270&amp;integration_type=0&amp;scope=bot">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10-beta.2/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="https://avocloud.net/assets/css/main.css">
    <script src="https://avocloud.net/assets/js/theme.js"></script>
</head>

<body>
    <div id="gradientbar"></div>

    <!-- Nav -->
    <nav class="site-nav" id="site-nav">
        <a class="avocloud-logo" href="/" aria-label="AVOCLOUD.NET">
            <span class="avocloud-logo__slot">
                <span class="avocloud-logo__icon">
                    <svg viewBox="0 0 100 75" fill="none">
                        <path d="M 43 65 L 11 65 L 33 10 L 67 65 L 91 12"
                            stroke="currentColor" stroke-width="8.5"
                            stroke-linecap="round" stroke-linejoin="round"
                            pathLength="200"/>
                    </svg>
                </span>
                <span class="avocloud-logo__av">AVO</span>
            </span>
            <span class="avocloud-logo__rest-wrap">
                <span class="avocloud-logo__rest">CLOUD<span class="avocloud-logo__dot">.NET</span></span>
            </span>
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <svg id="theme-icon" viewBox="0 0 24 24"></svg>
        </button>
    </nav>
    <div class="redirect-container">
        <div class="card text-center" style="max-width: 400px; width: 100%; padding: 2.5rem 2rem;">
            <div class="flex justify-center mb-4" style="color:#9333ea">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="#9333ea"
                    style="width:2.5rem;height:2.5rem;animation:dcSpin 2.4s cubic-bezier(0.4,0,0.2,1) infinite;transform-origin:50% 50%;">
                    <path
                        d="M13.545 2.907a13.2 13.2 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.2 12.2 0 0 0-3.658 0 8 8 0 0 0-.412-.833.05.05 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.04.04 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032q.003.022.021.037a13.3 13.3 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019q.463-.63.818-1.329a.05.05 0 0 0-.01-.059l-.018-.011a9 9 0 0 1-1.248-.595.05.05 0 0 1-.02-.066l.015-.019q.127-.095.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.007q.121.1.248.195a.05.05 0 0 1-.004.085 8 8 0 0 1-1.249.594.05.05 0 0 0-.03.03.05.05 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.2 13.2 0 0 0 4.001-2.02.05.05 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.03.03 0 0 0-.02-.019m-8.198 7.307c-.789 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612m5.316 0c-.788 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612" />
                </svg>
            </div>
            <h1 class="text-xl font-bold mb-2">Redirecting to <span class="highlight-purple">Discord</span></h1>
            <p class="text-muted text-sm mb-6">You'll be redirected automatically in a moment...</p>
            <a href="https://discord.com/oauth2/authorize?client_id=981268814308184084&amp;permissions=564464222465270&amp;integration_type=0&amp;scope=bot"
                class="accent-link text-sm">
                Click here if you are not redirected ↗
            </a>
        </div>
    </div>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-6px)
            }
        }

        @keyframes dcSpin {
            0% {
                transform: rotate(0deg);
            }

            30% {
                transform: rotate(370deg);
            }

            42% {
                transform: rotate(350deg);
            }

            52% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <script src="https://avocloud.net/assets/js/main.js"></script>
</body>

</html>
